image: python:3.11-slim

stages:
  - run

before_script:
  - apt-get update && apt-get install -y ffmpeg libsm6 libxext6
  - pip install --upgrade pip
  - pip install requests openai pillow moviepy google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

run-agent:
  stage: run
  script:
    - python main.py
